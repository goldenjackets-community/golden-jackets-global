name: Update Global Stats

on:
  # Only manual trigger - auto-counting is supplementary, never decreases
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch chapter data and update stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOTAL_MEMBERS=0
          TOTAL_CERTS=0
          ACTIVE=0

          REPOS=$(jq -r '.chapters[] | select(.status=="active" and .repo!="") | .repo + "|" + .branch' data.json)

          for entry in $REPOS; do
            REPO=$(echo "$entry" | cut -d'|' -f1)
            BRANCH=$(echo "$entry" | cut -d'|' -f2)

            echo "Fetching $REPO ($BRANCH)..."
            HTML=$(gh api "repos/$REPO/contents/index.html?ref=$BRANCH" --jq '.content' | base64 -d 2>/dev/null || echo "")

            if [ -z "$HTML" ]; then
              echo "  Skipped (no access)"
              continue
            fi

            # Count all member-card divs (golden + alumni + challengers)
            CM=$(echo "$HTML" | grep -c 'class="member-card' || true)
            CHALLENGERS=$(echo "$HTML" | grep -c 'member-card challenger' || true)
            ALUMNI=$(echo "$HTML" | grep -c 'member-card alumni' || true)
            
            # Certifications: golden=12, challengers=10, alumni=12
            GOLDEN=$((CM - CHALLENGERS - ALUMNI))
            CC=$(( (GOLDEN * 12) + (CHALLENGERS * 10) + (ALUMNI * 12) ))

            TOTAL_MEMBERS=$((TOTAL_MEMBERS + CM))
            TOTAL_CERTS=$((TOTAL_CERTS + CC))
            ACTIVE=$((ACTIVE + 1))

            echo "  $CM members ($GOLDEN golden, $ALUMNI alumni, $CHALLENGERS challengers), $CC certs"
          done

          COUNTRIES=$(jq '.chapters | length' data.json)
          echo "=== Counted: $TOTAL_MEMBERS members, $TOTAL_CERTS certs ==="

          # SAFETY: Never decrease stats. Only update if higher than current.
          CURRENT_MEMBERS=$(jq -r '.stats.members' data.json)
          CURRENT_CERTS=$(jq -r '.stats.certifications' data.json)

          if [ "$TOTAL_MEMBERS" -gt "$CURRENT_MEMBERS" ]; then
            FINAL_MEMBERS=$TOTAL_MEMBERS
          else
            FINAL_MEMBERS=$CURRENT_MEMBERS
            echo "⚠️ Keeping existing member count ($CURRENT_MEMBERS) — site count ($TOTAL_MEMBERS) is lower (some members not on site yet)"
          fi

          if [ "$TOTAL_CERTS" -gt "$CURRENT_CERTS" ]; then
            FINAL_CERTS=$TOTAL_CERTS
          else
            FINAL_CERTS=$CURRENT_CERTS
            echo "⚠️ Keeping existing cert count ($CURRENT_CERTS)"
          fi

          # Update data.json
          jq \
            --argjson m "$FINAL_MEMBERS" \
            --argjson c "$FINAL_CERTS" \
            --argjson a "$ACTIVE" \
            --argjson co "$COUNTRIES" \
            --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '.stats.members=$m | .stats.certifications=$c | .stats.active_chapters=$a | .stats.countries=$co | .last_updated=$date' \
            data.json > data_tmp.json && mv data_tmp.json data.json

          # Update index.html counters
          OLD_MEMBERS=$(grep -oP 'data-target="\K\d+(?=".*Members)' index.html | head -1)
          OLD_CERTS=$(grep -oP 'data-target="\K\d+(?=".*Certifications)' index.html | head -1)

          if [ -n "$OLD_MEMBERS" ]; then
            sed -i "s/data-target=\"${OLD_MEMBERS}\"\(.*Members\)/data-target=\"${FINAL_MEMBERS}\"\1/" index.html
            sed -i "s/🏆 ${OLD_MEMBERS} Members/🏆 ${FINAL_MEMBERS} Members/g" index.html
            sed -i "s/${OLD_MEMBERS} members/${FINAL_MEMBERS} members/g" index.html
          fi
          if [ -n "$OLD_CERTS" ]; then
            sed -i "s/data-target=\"${OLD_CERTS}\"\(.*Certifications\)/data-target=\"${FINAL_CERTS}\"\1/" index.html
            sed -i "s/📜 ${OLD_CERTS}+/📜 ${FINAL_CERTS}+/g" index.html
            sed -i "s/${OLD_CERTS}+ Certifications/${FINAL_CERTS}+ Certifications/g" index.html
          fi

          echo "=== Final: $FINAL_MEMBERS members, $FINAL_CERTS certs ==="
          cat data.json | jq '.stats'

      - name: Commit if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data.json index.html
          git diff --cached --quiet || git commit -m "Auto-update stats: $(jq -r '.stats.members' data.json) members, $(jq -r '.stats.certifications' data.json) certs"
          git push
