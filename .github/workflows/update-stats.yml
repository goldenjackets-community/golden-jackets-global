name: Update Global Stats

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [chapter-updated]

permissions:
  contents: write
jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch chapter data and update stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOTAL_MEMBERS=0
          TOTAL_CERTS=0
          ACTIVE=0

          # Get active chapter repos from data.json
          REPOS=$(jq -r '.chapters[] | select(.status=="active" and .repo!="") | .repo + "|" + .branch' data.json)

          for entry in $REPOS; do
            REPO=$(echo "$entry" | cut -d'|' -f1)
            BRANCH=$(echo "$entry" | cut -d'|' -f2)

            echo "Fetching $REPO ($BRANCH)..."
            HTML=$(gh api "repos/$REPO/contents/index.html?ref=$BRANCH" --jq '.content' | base64 -d 2>/dev/null || echo "")

            if [ -z "$HTML" ]; then
              echo "  Skipped (no access)"
              continue
            fi

            GOLDEN=$(echo "$HTML" | grep -c 'member-card"' || true)
            GOLDEN_F=$(echo "$HTML" | grep -c 'member-card founder"' || true)
            GOLDEN_C=$(echo "$HTML" | grep -c 'member-card cofounder"' || true)
            ALUMNI=$(echo "$HTML" | grep -c 'member-card alumni"' || true)
            CHALLENGERS=$(echo "$HTML" | grep -c 'member-card challenger"' || true)

            CHAPTER_MEMBERS=$((GOLDEN + GOLDEN_F + GOLDEN_C + ALUMNI + CHALLENGERS))
            GJ_COUNT=$((GOLDEN + GOLDEN_F + GOLDEN_C + ALUMNI))
            CHAPTER_CERTS=$(( (GJ_COUNT * 12) + (CHALLENGERS * 10) ))

            TOTAL_MEMBERS=$((TOTAL_MEMBERS + CHAPTER_MEMBERS))
            TOTAL_CERTS=$((TOTAL_CERTS + CHAPTER_CERTS))
            ACTIVE=$((ACTIVE + 1))

            echo "  $CHAPTER_MEMBERS members, $CHAPTER_CERTS certs"
          done

          COUNTRIES=$(jq '.chapters | length' data.json)
          echo "=== Total: $TOTAL_MEMBERS members, $TOTAL_CERTS certs, $ACTIVE active, $COUNTRIES countries ==="

          # Update data.json
          jq \
            --argjson m "$TOTAL_MEMBERS" \
            --argjson c "$TOTAL_CERTS" \
            --argjson a "$ACTIVE" \
            --argjson co "$COUNTRIES" \
            --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '.stats.members=$m | .stats.certifications=$c | .stats.active_chapters=$a | .stats.countries=$co | .last_updated=$date' \
            data.json > data_tmp.json && mv data_tmp.json data.json

          cat data.json | jq '.stats'

      - name: Commit if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Auto-update stats: $(jq -r '.stats.members' data.json) members, $(jq -r '.stats.certifications' data.json) certs"
          git push
