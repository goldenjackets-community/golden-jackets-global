name: Update Global Stats

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [chapter-updated]

permissions:
  contents: write
jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch chapter data and update stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOTAL_MEMBERS=0
          TOTAL_CERTS=0
          ACTIVE=0

          declare -A CHAPTER_MEMBERS
          declare -A CHAPTER_NAMES

          REPOS=$(jq -r '.chapters[] | select(.status=="active" and .repo!="") | .id + "|" + .repo + "|" + .branch' data.json)

          for entry in $REPOS; do
            ID=$(echo "$entry" | cut -d'|' -f1)
            REPO=$(echo "$entry" | cut -d'|' -f2)
            BRANCH=$(echo "$entry" | cut -d'|' -f3)

            echo "Fetching $REPO ($BRANCH)..."
            HTML=$(gh api "repos/$REPO/contents/index.html?ref=$BRANCH" --jq '.content' | base64 -d 2>/dev/null || echo "")

            if [ -z "$HTML" ]; then
              echo "  Skipped (no access)"
              continue
            fi

            GOLDEN=$(echo "$HTML" | grep -c 'member-card"' || true)
            GOLDEN_F=$(echo "$HTML" | grep -c 'member-card founder"' || true)
            GOLDEN_C=$(echo "$HTML" | grep -c 'member-card cofounder"' || true)
            ALUMNI=$(echo "$HTML" | grep -c 'member-card alumni"' || true)
            CHALLENGERS=$(echo "$HTML" | grep -c 'member-card challenger"' || true)

            CM=$((GOLDEN + GOLDEN_F + GOLDEN_C + ALUMNI + CHALLENGERS))
            GJ_COUNT=$((GOLDEN + GOLDEN_F + GOLDEN_C + ALUMNI))
            CC=$(( (GJ_COUNT * 12) + (CHALLENGERS * 10) ))

            TOTAL_MEMBERS=$((TOTAL_MEMBERS + CM))
            TOTAL_CERTS=$((TOTAL_CERTS + CC))
            ACTIVE=$((ACTIVE + 1))

            CHAPTER_MEMBERS[$ID]=$CM
            # Get member names from h3 tags
            NAMES=$(echo "$HTML" | grep -oP '(?<=<h3>)[^<]+' | head -15 | paste -sd '·' | sed 's/·/ · /g')
            CHAPTER_NAMES[$ID]="$NAMES"

            echo "  $CM members, $CC certs"
          done

          COUNTRIES=$(jq '.chapters | length' data.json)
          echo "=== Total: $TOTAL_MEMBERS members, $TOTAL_CERTS certs, $ACTIVE active, $COUNTRIES countries ==="

          # Update data.json
          jq \
            --argjson m "$TOTAL_MEMBERS" \
            --argjson c "$TOTAL_CERTS" \
            --argjson a "$ACTIVE" \
            --argjson co "$COUNTRIES" \
            --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '.stats.members=$m | .stats.certifications=$c | .stats.active_chapters=$a | .stats.countries=$co | .last_updated=$date' \
            data.json > data_tmp.json && mv data_tmp.json data.json

          # Update index.html with new numbers - use label as anchor to avoid wrong replacements
          OLD_MEMBERS=$(grep 'Members</div>' index.html | grep -oP 'data-target="\K\d+')
          OLD_CERTS=$(grep 'Certifications</div>' index.html | grep -oP 'data-target="\K\d+')

          # Replace stats using specific context
          sed -i "s/data-target=\"${OLD_MEMBERS}\"\(.*Members<\)/data-target=\"${TOTAL_MEMBERS}\"\1/" index.html
          sed -i "s/data-target=\"${OLD_CERTS}\"/data-target=\"${TOTAL_CERTS}\"/" index.html
          sed -i "s/${OLD_CERTS}+ Certifications/${TOTAL_CERTS}+ Certifications/g" index.html
          sed -i "s/${OLD_CERTS}+/${TOTAL_CERTS}+/g" index.html
          sed -i "s/🏆 ${OLD_MEMBERS} Members Worldwide/🏆 ${TOTAL_MEMBERS} Members Worldwide/g" index.html
          sed -i "s/${OLD_MEMBERS} members across/${TOTAL_MEMBERS} members across/g" index.html
          sed -i "s/${OLD_MEMBERS} members,/${TOTAL_MEMBERS} members,/g" index.html
          sed -i "s/${OLD_MEMBERS} members ·/${TOTAL_MEMBERS} members ·/g" index.html

          # Update per-chapter member counts in index.html
          for ID in "${!CHAPTER_MEMBERS[@]}"; do
            CM=${CHAPTER_MEMBERS[$ID]}
            # Update "XX members" patterns for each chapter
            case $ID in
              uk) sed -i -E "s/UK · [0-9]+ Members/UK · ${CM} Members/g" index.html
                  sed -i -E "s/United Kingdom · [0-9]+ members/United Kingdom · ${CM} members/g" index.html
                  sed -i -E "s/[0-9]+ members · Chapter Lead: Daniel Gaina/${CM} members · Chapter Lead: Daniel Gaina/g" index.html
                  ;;
              brazil) sed -i -E "s/Brazil · [0-9]+ Members/Brazil · ${CM} Members/g" index.html
                  ;;
              poland) sed -i -E "s/Poland · [0-9]+ Members/Poland · ${CM} Members/g" index.html
                  sed -i -E "s/Poland · [0-9]+ members/Poland · ${CM} members/g" index.html
                  ;;
              chile) sed -i -E "s/Chile · [0-9]+ Members/Chile · ${CM} Members/g" index.html
                  sed -i -E "s/Chile · [0-9]+ members/Chile · ${CM} members/g" index.html
                  ;;
            esac
          done

          cat data.json | jq '.stats'

      - name: Commit if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data.json index.html
          git diff --cached --quiet || git commit -m "Auto-update stats: $(jq -r '.stats.members' data.json) members, $(jq -r '.stats.certifications' data.json) certs"
          git push
